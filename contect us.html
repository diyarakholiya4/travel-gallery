<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
   <style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    line-height: 1.6;
    background-color: #f9f9f9;
    color: #333;
}

header {
    background: #33334d;
    color: #fff;
    padding: 1rem 0;
    text-align: center;
}

header h1 {
    margin: 0;
}

nav {
    margin-top: 10px;
}

nav a {
    margin: 0 10px;
    color: #fff;
    text-decoration: none;
}

nav a:hover {
    text-decoration: underline;
}

.contact-container {
    max-width: 600px;
    margin: 2rem auto;
    background: #fff;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.contact-container h2 {
    text-align: center;
    margin-bottom: 1rem;
}

.contact-container form {
    display: flex;
    flex-direction: column;
}

.contact-container label {
    margin-top: 1rem;
    font-weight: bold;
}

.contact-container input,
.contact-container textarea {
    width: 100%;
    padding: 0.5rem;
    margin-top: 0.5rem;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.contact-container button {
    margin-top: 1.5rem;
    padding: 0.7rem;
    border: none;
    background: #0078d7;
    color: #fff;
    font-size: 1rem;
    border-radius: 5px;
    cursor: pointer;
}

.contact-container button:hover {
    background: #005bb5;
}

#success-message {
    text-align: center;
    color: green;
    font-weight: bold;
    margin-top: 1rem;
}

.hidden {
    display: none;
}
footer{ background-color:#33334d;
color: #fff;
}

</style>
</head>
<body>
    <header>
        <h1>Travel Gallery</h1>
        <nav>
            <a href="file:///C:/Users/diya4/Desktop/website/index.html#Home">Home</a>
            <a href="file:///C:/Users/diya4/Desktop/website/index.html#gallery">Gallery</a>
<a href="file:///C:/Users/diya4/Desktop/website/index.html#destination">Destination</a>
      <a href="file:///C:/Users/diya4/Desktop/website/index.html#about">About</a>

            <a href="file:///C:/Users/diya4/Desktop/website/index.html#contact">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="contact-container">
            <h2>Contact Us</h2>
            <p>Have questions or want to share your travel experience? Reach out to us!</p>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
                
                <button type="submit">Send Message</button>
            </form>
            <p id="success-message" class="hidden">Thank you for contacting us! We will get back to you soon.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Travel Gallery. All rights reserved.</p>
    </footer>
    <script>
document.getElementById("contact-form").addEventListener("submit", function (event) {
    event.preventDefault(); // Prevent the default form submission behavior

    // Show the success message
    const successMessage = document.getElementById("success-message");
    successMessage.classList.remove("hidden");

    // Reset the form fields
    document.getElementById("contact-form").reset();
});

</script>
</body>
</html>
